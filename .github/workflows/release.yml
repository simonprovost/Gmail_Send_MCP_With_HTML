name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump (creates and pushes a new v* tag)'
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version tag
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          latest=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
          if [[ -z "$latest" ]]; then
            major=0; minor=0; patch=0
          else
            ver="${latest#v}"
            IFS='.' read -r major minor patch <<<"$ver"
          fi
          case "${{ github.event.inputs.bump }}" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac
          new="v${major}.${minor}.${patch}"
          echo "Latest tag: ${latest:-<none>}"
          echo "New tag:    ${new}"
          echo "tag=${new}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git tag -a "${{ steps.bump.outputs.tag }}" -m "${{ steps.bump.outputs.tag }}"
          git push origin "${{ steps.bump.outputs.tag }}"

  build:
    needs: [tag]
    if: |
      always() &&
      (needs.tag.result == 'success' || needs.tag.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-arm64
            os: macos-latest
          - rid: osx-x64
            os: macos-latest
          - rid: linux-x64
            os: ubuntu-latest
          - rid: linux-arm64
            os: ubuntu-latest
          - rid: win-x64
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag || github.ref }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        shell: bash
        run: |
          dotnet publish gmail-mcp/gmail-mcp.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            -o out/${{ matrix.rid }}

      - name: Package
        shell: bash
        run: |
          cd out/${{ matrix.rid }}
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            7z a ../../gmail-mcp-${{ matrix.rid }}.zip gmail-mcp.exe
          else
            chmod +x gmail-mcp
            tar -czf ../../gmail-mcp-${{ matrix.rid }}.tar.gz gmail-mcp
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: gmail-mcp-${{ matrix.rid }}
          path: gmail-mcp-${{ matrix.rid }}.*

  release:
    needs: [tag, build]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (startsWith(github.ref, 'refs/tags/v') || needs.tag.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag || github.ref_name }}
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
