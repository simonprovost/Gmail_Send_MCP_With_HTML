name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-arm64
            os: macos-latest
          - rid: osx-x64
            os: macos-latest
          - rid: linux-x64
            os: ubuntu-latest
          - rid: linux-arm64
            os: ubuntu-latest
          - rid: win-x64
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        shell: bash
        run: |
          dotnet publish gmail-mcp/gmail-mcp.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            -o out/${{ matrix.rid }}

      - name: Package
        shell: bash
        run: |
          cd out/${{ matrix.rid }}
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            7z a ../../gmail-mcp-${{ matrix.rid }}.zip gmail-mcp.exe
          else
            chmod +x gmail-mcp
            tar -czf ../../gmail-mcp-${{ matrix.rid }}.tar.gz gmail-mcp
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: gmail-mcp-${{ matrix.rid }}
          path: gmail-mcp-${{ matrix.rid }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
